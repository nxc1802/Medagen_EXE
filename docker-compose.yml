services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - CV_ENDPOINT=http://cv-worker:8000
    depends_on:
      cv-worker:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    restart: unless-stopped

  cv-worker:
    build:
      context: ./cv-worker
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    volumes:
      - ./cv-worker/src:/app/src
      - ./cv-worker/models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
