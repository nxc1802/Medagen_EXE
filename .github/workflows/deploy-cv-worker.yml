name: Deploy CV Worker to Hugging Face Space

on:
  push:
    branches:
      - main
    paths:
      - 'cv-worker/**'
      - '.github/workflows/deploy-cv-worker.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          lfs: false

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SPACE_URL: "https://huggingface.co/spaces/Cuong2004/Medagen_EXE_Worker"
        run: |
          git config --global credential.helper store
          echo "https://user:$HF_TOKEN@huggingface.co" > ~/.git-credentials
          git clone $SPACE_URL hf_space
          rsync -av --exclude='models/*.pth' --exclude='.env' --exclude='.pytest_cache/' cv-worker/ hf_space/
          cd hf_space
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git config lfs.allowincompletepush true
          git add .
          git commit -m "Auto deploy CV worker from GitHub Actions" || true
          git push origin main
