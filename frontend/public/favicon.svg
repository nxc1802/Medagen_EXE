<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient (Teal to Emerald Green) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488" /> <!-- teal-600 -->
      <stop offset="100%" stop-color="#059669" /> <!-- emerald-600 -->
    </linearGradient>
    
    <!-- Cross/Shield Glow/Glossy Gradient -->
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#ccfbf1" /> <!-- teal-100 -->
    </linearGradient>

    <!-- Shadow filter for modern depth -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Rounded Shield Container -->
  <rect x="32" y="32" width="448" height="448" rx="128" fill="url(#bgGrad)" />

  <!-- Stylized inner glowing medical cross with rounded corners -->
  <g filter="url(#glow)">
    <!-- Horizontal bar -->
    <rect x="128" y="216" width="256" height="80" rx="24" fill="url(#crossGrad)" />
    <!-- Vertical bar -->
    <rect x="216" y="128" width="80" height="256" rx="24" fill="url(#crossGrad)" />
  </g>

  <!-- Accent Circle in the Center representing AI Node -->
  <circle cx="256" cy="256" r="20" fill="#0d9488" />
</svg>
